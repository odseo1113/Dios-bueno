<!DOCTYPE html>
<html>
<head>
    <title>Panel de Clientes</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-size: 18px;
        }

        .total {
            background: #007bff;
        }

        .interesados {
            background: #28a745;
        }

        .acciones {
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .exportar {
            background: #17a2b8;
            color: white;
        }

        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background: #007bff;
            color: white;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        tr:hover {
            background: #ddd;
        }

        .interesado {
            background: #d4edda !important;
        }
    </style>
</head>
<body>

    <h1>📊 Panel de Clientes</h1>

    <!-- 📊 ESTADÍSTICAS -->
    <div class="stats">
        <div class="card total">
            📊 Total: <span id="total">{{ total }}</span>
        </div>

        <div class="card interesados">
            💰 Interesados: <span id="interesados">0</span>
        </div>
    </div>

    <!-- 📤 BOTÓN EXPORTAR -->
    <div class="acciones">
        <a href="/exportar">
            <button class="exportar">📤 Exportar a Excel</button>
        </a>
    </div>

    <!-- 📋 TABLA -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>📱 Número</th>
                <th>💬 Mensaje</th>
                <th>📅 Fecha</th>
                <th>Estado</th>
            </tr>
        </thead>

        <tbody id="tabla-clientes">
            {% for usuario in usuarios %}
            <tr class="{% if usuario[2] == '2' %}interesado{% endif %}">
                <td>{{ usuario[0] }}</td>
                <td>{{ usuario[1] }}</td>
                <td>{{ usuario[2] }}</td>
                <td>{{ usuario[4] }}</td>
                <td>
                    {% if usuario[2] == '2' %}
                        🟢 Interesado
                    {% else %}
                        ⚪ Normal
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <!-- 🔥 SCRIPT TIEMPO REAL -->
    <script>
    function actualizarDatos() {
        fetch("/datos")
            .then(res => res.text())
            .then(data => {
                let partes = data.split("|");

                document.getElementById("tabla-clientes").innerHTML = partes[0];
                document.getElementById("total").innerText = partes[1];
                document.getElementById("interesados").innerText = partes[2];
            });
    }

    // 🔁 cada 5 segundos
    setInterval(actualizarDatos, 5000);
    </script>

</body>
</html>
